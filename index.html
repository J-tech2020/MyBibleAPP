<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 BibleQuiz</title>
    <link rel="manifest" href="manifest.json">
    <!-- Theme color for the mobile address bar status panel -->
    <meta name="theme-color" content="#121212">
    <style>
        body {
            background-color: #121212; 
            color: #EFBF04;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .quiz-container {
            width: 100%;
            max-width: 500px;
            background-color: #1E1E1E;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
        }
        
        .lang-selector {
            position: absolute;
            top: 15px;
            right: 20px;
            z-index: 10;
        }
        .lang-select {
            background-color: #333;
            color: #fff;
            border: 1px solid #EFBF04;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        .app-logo {
            max-width: 120px;
            height: auto;
            margin: 50px auto 10px auto; 
            display: block;
        }

        h1 { 
            color: #FFFFFF; 
            margin-bottom: 5px; 
            font-size: 24px; 
            margin-top: 10px; 
        }
        .progress-text { color: #AAAAAA; font-size: 14px; margin-bottom: 20px; }
        
        .verse-card {
            background-color: #111111; 
            color: #FFFFFF;            
            border: 1px solid #EFBF04; 
            padding: 20px;
            border-radius: 8px;
            font-style: italic;
            margin-bottom: 20px;
            line-height: 1.5;
            font-size: 18px;       
            font-weight: 700;      
            text-align: left !important;
        }
        
        .option-label, .option-card {
            display: flex; 
            align-items: center;
            background-color: #333333; 
            padding: 16px; 
            margin: 12px 0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            border: 1px solid transparent;
            text-align: left;
            -webkit-tap-highlight-color: transparent; 
        }
        .option-label:hover, .option-card:hover { background-color: #444444; }
        input[type="radio"] { margin-right: 12px; transform: scale(1.3); }

        .selected-wrong { border: 1px solid #F44336; background-color: #2c1a1a; cursor: not-allowed; }
        .is-correct { border: 1px solid #4CAF50; background-color: #1a2c1a; cursor: not-allowed; }
        .disabled-option { opacity: 0.6; cursor: not-allowed; }
        
        .option-card, label {
            color: #e0e0e0 !important; 
            font-size: 16px; 
        }

        .btn, .action-btn {
            display: inline-block;
            background-color: #1E88E5;
            color: white !important;
            border: none;
            padding: 14px 30px; 
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            text-decoration: none;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover, .action-btn:hover { background-color: #1565C0; }
        
        .feedback {
            font-size: 16px;
            font-weight: bold;
            margin: 15px 0;
            padding: 12px;
            border-radius: 6px;
        }

        .results-box {
            background-color: #2c3e50;
            border: 2px solid #34495e;
            padding: 25px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .expert-box {
            background-color: #1a1a1a !important;
            border: 2px solid #EFBF04 !important;
            box-shadow: 0 0 15px rgba(239, 191, 4, 0.4) !important;
        }

        .review-box {
            margin-top: 25px;
            text-align: left;
            background-color: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
            max-height: 350px;
            overflow-y: auto;
        }
        .review-title {
            color: #FFFFFF;
            font-size: 18px;
            margin-top: 0;
            border-bottom: 2px solid #EFBF04;
            padding-bottom: 8px;
        }
        .review-item {
            border-bottom: 1px solid #333;
            padding: 15px 0;
        }
        .review-item:last-child {
            border-bottom: none;
        }
        .review-verse {
            color: #E0E0E0;
            font-style: italic;
            font-size: 15px;
            margin: 5px 0;
        }
    </style>
</head>
<body> 

<div class="quiz-container">
    
    <div id="lang-selector-wrapper" class="lang-selector">
        <select id="lang-select-element" class="lang-select" onchange="startQuiz(this.value);">
            <option value="en">English (KJV)</option>
            <option value="rvg">Español (RVG)</option>
        </select>
    </div>

    <img src="static/logo.png" alt="Bible Quiz Logo" class="app-logo">

    <h1 id="main-title">Bible Quiz</h1>
    
    <!-- 🏠 The alignment property gets forced inside translateStaticLayoutStrings() -->
    <p id="main-instructions" style="color: #FFFFFF; font-size: 14px; margin: -5px 0 15px 0; font-style: italic;"></p>
    
    <div id="quiz-gameplay-section">
        <div id="progress-display" class="progress-text"></div>
        <div id="verse-text-container" class="verse-card"></div>
        <div id="options-insertion-root"></div>
        <div id="feedback-display-panel" class="feedback" style="display: none;"></div>
        <button id="primary-action-btn" class="action-btn"></button>
    </div>
    
    <div id="quiz-results-section" style="display: none;">
        <div id="results-card-theme" class="results-box" style="text-align: left;">
            <h2 id="results-headline"></h2>
            
            <div id="badge-container" style="background-color: #1c2833; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px solid #EFBF04; display: none;">
                <h3 id="badge-display" style="font-size: 26px; margin: 0 0 5px 0; color: #FFF;"></h3>
                <p id="badge-message" style="margin: 0; color: #EFBF04; font-size: 15px; font-weight: bold;"></p>
            </div>

            <p style="font-size: 18px; margin: 15px 0; color: #E0E0E0;">  
                <span id="score-label-string">Score:</span> <strong><span id="final-score-digits"></span> / 10</strong>
            </p>
            <h3 id="final-percentage-digits" style="color: #4CAF50; font-size: 32px; margin: 10px 0;"></h3>
            
            <button id="restart-game-btn" class="btn" style="background-color: #4CAF50;">Restart Quiz</button>
        </div>

        <div id="errors-review-container" class="review-box" style="display: none;">
            <h3 id="review-panel-title" class="review-title"></h3>
            <div id="review-items-list"></div>
        </div>
    </div>
</div>

<script src="static/bible_data_en.js"></script>
<script src="static/bible_data_rvg.js"></script>

<script>
let currentPool = [];
let currentScore = 0;
let questionCount = 1;
let currentLanguage = 'en'; 
let hasCheckedCurrentQuestion = false;

let currentCorrectAnswer = "";
let currentVerseText = "";
let currentRandomizedOptions = [];
let selectedUserChoice = null;
let missedAccumulator = []; 

function startQuiz(lang) {
    currentLanguage = lang || 'en';
    currentScore = 0;
    questionCount = 1;
    missedAccumulator = [];
    hasCheckedCurrentQuestion = false;

    const selectEl = document.getElementById("lang-select-element");
    if (selectEl) selectEl.value = currentLanguage;

    document.getElementById("quiz-gameplay-section").style.display = "block";
    document.getElementById("quiz-results-section").style.display = "none";

    translateStaticLayoutStrings();

    if (currentLanguage === 'rvg') {
        currentPool = (typeof BIBLE_DATA_RVG !== 'undefined') ? BIBLE_DATA_RVG : [];
    } else {
        currentPool = (typeof BIBLE_DATA_EN !== 'undefined') ? BIBLE_DATA_EN : [];
    }

    if (!currentPool || currentPool.length < 3) {
        alert(`❌ Error: Cannot read Bible data arrays.`);
        return;
    }

    generateQuestion();
}

function generateQuestion() {
    hasCheckedCurrentQuestion = false;
    selectedUserChoice = null;

    const feedbackBox = document.getElementById("feedback-display-panel");
    if (feedbackBox) feedbackBox.style.display = "none";

    const correctObj = currentPool[Math.floor(Math.random() * currentPool.length)];
    currentCorrectAnswer = `${correctObj.book} ${correctObj.chapter}:${correctObj.verse}`;
    currentVerseText = correctObj.text;

    // 🛠️ FIX: Filter wrong options safely directly out of actual valid verse references 
    let distractors = new Set();
    let loopsSafety = 0;
    while (distractors.size < 3 && loopsSafety < 1000) {
        loopsSafety++;
        let randomWrongObj = currentPool[Math.floor(Math.random() * currentPool.length)];
        let refString = `${randomWrongObj.book} ${randomWrongObj.chapter}:${randomWrongObj.verse}`;
        
        // Ensure it isn't the correct reference, and isn't from the same book to keep it challenging
        if (refString !== currentCorrectAnswer && randomWrongObj.book !== correctObj.book) {
            distractors.add(refString);
        }
    }

    // Fallback if filtering down books leaves options short
    if (distractors.size < 3) {
        currentPool.forEach(v => {
            let refString = `${v.book} ${v.chapter}:${v.verse}`;
            if (refString !== currentCorrectAnswer && distractors.size < 3) {
                distractors.add(refString);
            }
        });
    }

    currentRandomizedOptions = [currentCorrectAnswer, ...Array.from(distractors)];
    currentRandomizedOptions.sort(() => Math.random() - 0.5);

    renderQuestionState();
}

function renderQuestionState() {
    document.getElementById("progress-display").innerText = currentLanguage === 'rvg' 
        ? `Pregunta ${questionCount} de 10 | Puntuación: ${currentScore}`
        : `Question ${questionCount} of 10 | Score: ${currentScore}`;

    document.getElementById("verse-text-container").innerText = `“${currentVerseText}”`;

    const insertionRoot = document.getElementById("options-insertion-root");
    insertionRoot.innerHTML = "";

    currentRandomizedOptions.forEach((optionText, index) => {
        const card = document.createElement("div");
        card.className = "option-card";
        card.style.padding = "12px";
        card.style.margin = "8px 0";
        card.style.border = "1px solid #444";
        card.style.borderRadius = "6px";
        card.style.cursor = "pointer";
        card.style.display = "flex";
        card.style.alignItems = "center";

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "user_choice_items";
        input.id = `opt-${index}`;
        input.value = optionText;
        input.style.marginRight = "10px";
        
        input.onclick = (e) => { 
            e.stopPropagation(); 
            selectedUserChoice = optionText; 
        };

        const label = document.createElement("label");
        label.setAttribute("for", `opt-${index}`);
        label.style.cursor = "pointer";
        label.style.width = "100%";
        label.appendChild(document.createTextNode(optionText));

        card.appendChild(input);
        card.appendChild(label);
        
        card.onclick = () => {
            if (hasCheckedCurrentQuestion) return;
            input.checked = true;
            selectedUserChoice = optionText;
        };

        insertionRoot.appendChild(card);
    });

    const mainActionBtn = document.getElementById("primary-action-btn");
    mainActionBtn.innerText = currentLanguage === 'rvg' ? "Enviar Respuesta ➡️" : "Submit Answer ➡️";
    mainActionBtn.style.backgroundColor = "#1E88E5";
    mainActionBtn.onclick = checkAnswer;
}

function checkAnswer() {
    if (!hasCheckedCurrentQuestion) {
        if (!selectedUserChoice) {
            alert(currentLanguage === 'rvg' ? "Por favor seleccione una opción." : "Please select an option.");
            return;
        }

        hasCheckedCurrentQuestion = true;
        const isCorrect = (selectedUserChoice === currentCorrectAnswer);
        
        if (isCorrect) {
            currentScore++;
        } else {
            missedAccumulator.push({
                text: currentVerseText,
                user_guess: selectedUserChoice,
                correct: currentCorrectAnswer
            });
        }

        const optionCards = document.querySelectorAll(".option-card");
        optionCards.forEach((card) => {
            const optVal = card.querySelector("input").value;
            card.querySelector("input").disabled = true;

            if (optVal === currentCorrectAnswer) {
                card.style.backgroundColor = "#1b2c1a";
                card.style.borderColor = "#4CAF50";
                card.style.color = "#4CAF50";
            } else if (optVal === selectedUserChoice) {
                card.style.backgroundColor = "#2c1a1a";
                card.style.borderColor = "#F44336";
                card.style.color = "#F44336";
            }
        });

        const feedbackBox = document.getElementById("feedback-display-panel");
        if (currentLanguage === 'rvg') {
            feedbackBox.innerText = isCorrect ? "✅ ¡Correcto!" : `❌ Incorrecto. Era ${currentCorrectAnswer}`;
        } else {
            feedbackBox.innerText = isCorrect ? "✅ Correct!" : `❌ Incorrect. It was ${currentCorrectAnswer}`;
        }
        feedbackBox.style.backgroundColor = isCorrect ? "#1a2c1a" : "#2c1a1a";
        feedbackBox.style.color = isCorrect ? "#4CAF50" : "#F44336";
        feedbackBox.style.display = "block";

        const mainActionBtn = document.getElementById("primary-action-btn");
        if (questionCount >= 10) {
            mainActionBtn.innerText = currentLanguage === 'rvg' ? "Ver Resultados 🎉" : "See Final Results 🎉";
            mainActionBtn.style.backgroundColor = "#4CAF50";
        } else {
            mainActionBtn.innerText = currentLanguage === 'rvg' ? "Siguiente Pregunta 🔄" : "Next Question 🔄";
            mainActionBtn.style.backgroundColor = "#FFB300";
            mainActionBtn.style.color = "black";
        }
    } else {
        if (questionCount >= 10) {
            showResults();
        } else {
            questionCount++;
            generateQuestion();
        }
    }
}

function showResults() {
    document.getElementById("quiz-gameplay-section").style.display = "none";
    document.getElementById("quiz-results-section").style.display = "block";

    const percentage = Math.round((currentScore / 10) * 100);
    const isSpanish = (currentLanguage === 'rvg');
    
    document.getElementById("score-label-string").innerText = isSpanish ? "Tu Puntuación Final:" : "Your Final Score:";
    document.getElementById("final-score-digits").innerText = currentScore;
    document.getElementById("final-percentage-digits").innerText = `${percentage}%`;

    const headlineEl = document.getElementById("results-headline");
    const badgeContainerEl = document.getElementById("badge-container");
    const badgeDisplayEl = document.getElementById("badge-display");
    const badgeMessageEl = document.getElementById("badge-message");
    const cardThemeEl = document.getElementById("results-card-theme");

    if (cardThemeEl) cardThemeEl.classList.remove("expert-box");
    if (badgeContainerEl) badgeContainerEl.style.display = "none";

    const hasEarned100Before = localStorage.getItem("bible_quiz_earned_100") === "true";

    if (percentage === 100 && !hasEarned100Before) {
        localStorage.setItem("bible_quiz_earned_100", "true");
        headlineEl.innerText = isSpanish ? "¡Eres un Experto!" : "You are an Expert!";
        if (badgeDisplayEl) badgeDisplayEl.innerText = "🏆";
        if (badgeMessageEl) badgeMessageEl.innerText = isSpanish ? "¡Insignia de Experto Ganada!" : "Expert Crown Badge Earned!";
        if (badgeContainerEl) badgeContainerEl.style.display = "block";
        if (cardThemeEl) cardThemeEl.classList.add("expert-box");
    } else if (percentage >= 90 && percentage <= 100) {
        headlineEl.innerText = isSpanish ? "¡Eres un erudito bíblico!" : "You are a biblical scholar!";
    } else if (percentage >= 70 && percentage <= 80) {
        headlineEl.innerText = isSpanish ? "¡Gran trabajo! Sigue intentándolo" : "Great job! Keep trying!";
    } else {
        headlineEl.innerText = isSpanish ? "🎉 ¡Prueba Completada!" : "🎉 Quiz Complete!";
    }

    const restartBtn = document.getElementById("restart-game-btn");
    restartBtn.innerText = isSpanish ? "Jugar de Nuevo 🔄" : "Play Again 🔄";
    restartBtn.onclick = () => { startQuiz(currentLanguage); };

    const reviewContainer = document.getElementById("errors-review-container");
    const reviewListRoot = document.getElementById("review-items-list");
    reviewListRoot.innerHTML = "";

    if (missedAccumulator.length > 0) {
        document.getElementById("review-panel-title").innerText = isSpanish ? "📚 Repasa tus errores:" : "📚 Review what you missed:";
        missedAccumulator.forEach((item) => {
            const block = document.createElement("div");
            block.style.borderBottom = "1px solid #444";
            block.style.padding = "10px 0";
            block.innerHTML = `
                <p style="font-style: italic; color: #ccc; margin: 0 0 5px 0;">"${item.text}"</p>
                <p style="color: #F44336; margin: 2px 0; font-size: 14px; font-weight: bold;">
                    ${isSpanish ? '❌ Tu elección: ' : '❌ Your Guess: '}${item.user_guess}
                </p>
                <p style="color: #4CAF50; margin: 2px 0; font-size: 14px; font-weight: bold;">
                    ${isSpanish ? '✅ Respuesta correcta: ' : '✅ Correct Answer: '}${item.correct}
                </p>
            `;
            reviewListRoot.appendChild(block);
        });
        reviewContainer.style.display = "block";
    } else {
        reviewContainer.style.display = "none";
    }
}

function translateStaticLayoutStrings() {
    const isSpanish = (currentLanguage === 'rvg');
    document.getElementById("main-title").innerText = isSpanish ? "Quiz Bíblico" : "Bible Quiz";
    
    // ✍️ FIXED: Snaps text alignment cleanly to the left for instructions block
    const instructionsEl = document.getElementById("main-instructions");
    instructionsEl.style.textAlign = "left";
    instructionsEl.innerText = isSpanish 
         ? "Lea el breve pasaje bíblico y seleccione el versículo correcto. Si tu puntuación es 100% la primera vez que juegas, ganarás una insignia."
        : "Read the short biblical passage and select the correct verse. If your score is 100% the first time you play the game, you will earn a Badge.";
}

window.onload = () => {
    setTimeout(() => {
        const dropdown = document.getElementById('lang-select-element');
        const initialLang = dropdown ? dropdown.value : 'en';
        startQuiz(initialLang);
    }, 250); 
};
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker registered successfully!', reg))
            .catch(err => console.log('Service Worker registration failed: ', err));
    });
}
</script>
</body>
</html>
